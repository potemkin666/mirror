<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Mirror — an interactive portrait assembled from the involuntary confessions of a browser." />
  <title>The Mirror</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- WebGL refraction layer — sits beneath the 2D canvas -->
  <canvas id="glass-canvas" aria-hidden="true"></canvas>

  <!-- Primary rendering surface -->
  <canvas id="mirror-canvas" aria-hidden="true"></canvas>

  <!-- Vignette darkens the edges of the chamber -->
  <div id="vignette" aria-hidden="true"></div>

  <!-- Ambient text fragments float here -->
  <div id="text-overlay" aria-live="polite" aria-label="Ambient reflections"></div>

  <!-- Landing veil — covers until the visitor moves or clicks -->
  <div id="landing-veil">
    <h1 class="mirror-title">the mirror</h1>
    <p class="invitation">move to begin</p>
    <p class="landing-hint">or simply wait</p>
  </div>

  <!-- Custom cursor dot -->
  <div id="cursor" aria-hidden="true"></div>

  <!-- Minimal control cluster — hidden until awakened, appears on hover -->
  <nav id="controls" aria-label="Mirror controls">
    <button class="ctrl-btn" id="begin-btn">◈ enter</button>
    <button class="ctrl-btn" id="mute-btn">◎ mute</button>
    <button class="ctrl-btn" id="clear-memory-btn">◌ forget</button>
    <button class="ctrl-btn" id="save-btn">⎙ save</button>
    <button class="ctrl-btn" id="diag-btn" aria-expanded="false">⊙ reveal</button>
  </nav>

  <!-- Diagnostics panel — hidden by default, toggle with ⊙ reveal -->
  <div id="diagnostics" hidden aria-label="Session diagnostics" role="region"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
          integrity="sha512-dLRExBhMBP5a2biJnoNkeOHkQm0cKGoGPBxIhJ7vEe6XQeKAfRdJGT0WPQ95vEyhmYhg4TB2bLEhe2+tkE1MA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="script.js"></script>
</body>
</html>
